name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: abaya_shop_ci
          POSTGRES_USER: abaya
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://abaya:ci_password@localhost:5432/abaya_shop_ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema=apps/api/prisma/schema.prisma
      - run: pnpm --filter @abaya-shop/shared run build
      - run: pnpm --filter @abaya-shop/api run typecheck
      - run: pnpm --filter @abaya-shop/web run build
